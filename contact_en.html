<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - hovvy</title>
    <link rel="icon" href="images/hovvy.png" type="image/png">
    <link rel="stylesheet" href="style.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+JP:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- ヘッダー -->
    <header>
        <div class="container">
            <div class="logo">
                <a href="index_en.html">
                    <img src="images/hovvy.png" alt="hovvy" style="height: 40px; width: auto;">
                </a>
            </div>
            <button class="mobile-menu-toggle" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav>
                <ul>
                    <li><a href="apps_en.html">Apps</a></li>
                    <li><a href="about_en.html">About Us</a></li>
                    <li><a href="contact_en.html" class="nav-contact-btn">Contact</a></li>
                    <li><a href="contact.html" style="margin-left: 10px; font-size: 0.9rem;">JA</a> | <span style="font-weight: bold; font-size: 0.9rem;">EN</span></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- モバイルメニュー -->
    <div class="mobile-menu">
        <nav>
            <ul>
                <li><a href="apps_en.html">Apps</a></li>
                <li><a href="about_en.html">About Us</a></li>
                <li><a href="contact_en.html" class="nav-contact-btn">Contact</a></li>
                <li><a href="contact.html" style="margin-left: 10px; font-size: 0.9rem;">JA</a> | <span style="font-weight: bold; font-size: 0.9rem;">EN</span></li>
            </ul>
        </nav>
    </div>

    <!-- お問い合わせセクション -->
    <section class="contact" style="padding-top: 120px;">
        <div class="container">
            <h2 class="section-title">Contact</h2>
            <p style="text-align: center; margin-bottom: 40px;">If you have any questions or inquiries, please feel free to contact us using the form below.</p>
            <!-- Google Form埋め込み -->
            <div class="google-form-wrapper" style="width: 100%; max-width: 640px; margin: 0 auto;">
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfVuZ-3RvVFtzD86BL4UJ8NZzyX0jv3arEzS85tTqBIGNx_3w/viewform?embedded=true" width="100%" height="800" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
            </div>
        </div>
    </section>

    <!-- フッター -->
    <footer style="background-color: #333; color: white; padding: 40px 0; text-align: center; margin-top: 50px;">
        <div class="container">
            <div class="footer-links">
                <a href="apps_en.html">Apps</a>
                <a href="about_en.html">About Us</a>
                <a href="/privacy_policy_site/index.html">Privacy Policy</a>
            </div>
            <p class="copyright">&copy; 2025 hovvy. All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        // DOMの読み込み完了を待つ
        document.addEventListener('DOMContentLoaded', function() {
            // ハンバーガーメニューの開閉
            const mobileMenuToggle = document.querySelector('.mobile-menu-toggle');
            const mobileMenu = document.querySelector('.mobile-menu');
            
            if (mobileMenuToggle && mobileMenu) {
                mobileMenuToggle.addEventListener('click', function() {
                    this.classList.toggle('active');
                    mobileMenu.classList.toggle('active');
                });

                // モバイルメニューのリンクをクリックしたらメニューを閉じる
                mobileMenu.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', function() {
                        mobileMenuToggle.classList.remove('active');
                        mobileMenu.classList.remove('active');
                    });
                });
            }
        });
    </script>

</body>
</html>
