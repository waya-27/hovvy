<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NiceShot Log - hovvy</title>
    <link rel="icon" href="images/hovvy.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-color: #00b09b;
            --app-bg: #fafafa;
        }
        
        /* 1. ヒーローセクション */
        .app-hero-showcase {
            min-height: 85vh;
            background: var(--app-bg);
            display: flex;
            align-items: center;
            padding: 100px 5% 60px;
            position: relative;
            overflow: visible;
        }
        
        .hero-container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 160px;
            align-items: center;
            width: 100%;
        }
        
        .hero-text {
            padding-right: 40px;
        }
        
        .hero-catchcopy {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1.1;
            color: #1a1a1a;
            margin-bottom: 30px;
            letter-spacing: -0.02em;
        }
        
        .hero-subcopy {
            font-size: 1.4rem;
            color: #666;
            line-height: 1.6;
            font-weight: 400;
        }
        
        .hero-visual {
            position: relative;
            display: flex;
            justify-content: flex-end;
        }
        
        .hero-visual img {
            max-width: 120%;
            height: auto;
            animation: heroFloat 6s ease-in-out infinite;
            filter: drop-shadow(0 20px 60px rgba(0, 0, 0, 0.15));
        }
        
        @keyframes heroFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        /* 2. アイデンティティセクション */
        .app-identity {
            background: linear-gradient(135deg, var(--app-color) 0%, rgba(0, 176, 155, 0.7) 100%);
            padding: 80px 5%;
            text-align: center;
            color: white;
        }
        
        .identity-container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .app-icon-large {
            width: 120px;
            height: 120px;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin: 0 auto 30px;
            display: block;
        }
        
        .app-name-logo {
            font-size: 2.8rem;
            font-weight: 900;
            margin-bottom: 40px;
            color: white;
        }
        
        .store-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .store-button {
            display: inline-block;
            padding: 14px 32px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .store-button:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        /* 3. フィーチャーセクション */
        .features-showcase {
            padding: 120px 5%;
            background: white;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .feature-row {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 100px;
            align-items: center;
            margin-bottom: 140px;
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .feature-row.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .feature-row.reverse {
            grid-template-columns: 1.5fr 1fr;
        }
        
        .feature-row.reverse .feature-visual {
            order: 2;
        }
        
        .feature-row.reverse .feature-content {
            order: 1;
        }
        
        .feature-visual {
            position: relative;
        }
        
        .phone-mockup {
            background: linear-gradient(145deg, #f0f0f0, #ffffff);
            border-radius: 32px;
            padding: 12px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.12);
            max-width: 340px;
            margin: 0 auto;
        }
        
        .phone-mockup img {
            width: 100%;
            border-radius: 20px;
            display: block;
        }
        
        .feature-content {
            padding: 20px;
        }
        
        .feature-title {
            font-size: 2.4rem;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 20px;
            line-height: 1.2;
        }
        
        .feature-description {
            font-size: 1.15rem;
            color: #555;
            line-height: 1.8;
            font-weight: 400;
        }
        
        /* レスポンシブ */
        @media (max-width: 1024px) {
            .hero-container {
                grid-template-columns: 1fr;
                gap: 60px;
                text-align: center;
            }
            
            .hero-text {
                padding-right: 0;
            }
            
            .hero-catchcopy {
                font-size: 3rem;
            }
            
            .hero-visual {
                justify-content: center;
            }
            
            .hero-visual img {
                max-width: 90%;
            }
            
            .feature-row,
            .feature-row.reverse {
                grid-template-columns: 1fr;
                gap: 60px;
                margin-bottom: 100px;
            }
            
            .feature-row.reverse .feature-visual,
            .feature-row.reverse .feature-content {
                order: unset;
            }
            
            .feature-title {
                font-size: 2rem;
            }
        }
        
        @media (max-width: 768px) {
            .app-hero-showcase {
                min-height: auto;
                padding: 80px 5% 40px;
            }
            
            .hero-catchcopy {
                font-size: 2.2rem;
            }
            
            .hero-subcopy {
                font-size: 1.1rem;
            }
            
            .app-icon-large {
                width: 100px;
                height: 100px;
            }
            
            .app-name-logo {
                font-size: 2.2rem;
            }
            
            .features-showcase {
                padding: 80px 5%;
            }
            
            .feature-row {
                margin-bottom: 80px;
            }
            
            .phone-mockup {
                max-width: 280px;
            }
        }
    </style>
</head>
<body>

    <!-- ヘッダー -->
    <header>
        <div class="container">
            <div class="logo">
                <a href="index.html">
                    <img src="images/hovvy.png" alt="hovvy" style="height: 40px; width: auto;">
                </a>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html#apps">アプリ紹介</a></li>
                    <li><a href="about.html">会社概要</a></li>
                    <li><a href="contact.html" class="nav-contact-btn">お問い合わせ</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- ヒーローセクション -->
    <section class="app-hero-showcase">
        <div class="hero-container">
            <div class="hero-text">
                <h1 class="hero-catchcopy">練習の一球一球を、スコアアップに</h1>
                <p class="hero-subcopy">打ちっぱなしをデータ化し、クラブ別の成長を可視化。<br>戦略的な練習で最短ルートで上達。</p>
            </div>
            <div class="hero-visual">
                <img src="images/golf_graphic.png" alt="NiceShot Log フィーチャーグラフィック">
            </div>
        </div>
    </section>

    <!-- アイデンティティセクション -->
    <section class="app-identity">
        <div class="identity-container">
            <img src="images/golf_icon.png" alt="NiceShot Log アイコン" class="app-icon-large">
            <h2 class="app-name-logo">NiceShot Log</h2>
            <div class="store-buttons">
                <a href="https://apps.apple.com/jp/app/niceshot-log/id6759480419" target="_blank" class="store-button">
                    <img src="images/appstore@2x-e82b77c71493437d60f9154523ff1d7d.png" alt="App Store" style="height: 50px;">
                </a>
                <a href="https://play.google.com/store/apps/details?id=com.niceshotlog&hl=ja" target="_blank" class="store-button">
                    <img src="images/GetItOnGooglePlay_Badge_Web_color_English.png" alt="Google Play" style="height: 50px;">
                </a>
            </div>
        </div>
    </section>

    <!-- フィーチャーセクション -->
    <section class="features-showcase">
        <div class="feature-row">
            <div class="feature-visual">
                <div class="phone-mockup">
                    <img src="images/golf_shot1.png" alt="クラブ別データ記録画面">
                </div>
            </div>
            <div class="feature-content">
                <h3 class="feature-title">単調な打ちっぱなしを、<br>戦略的なゲームに</h3>
                <p class="feature-description">クラブごとのナイスショット率や平均飛距離を正確に記録。<br>実際のラウンドを想定してクラブを持ち替える「SUN ROUNDモード」で、自分の弱点を効率的に克服できます。<br>蓄積したデータは、実際のコースでの論理的なクラブ選択を強力にサポートします。</p>
            </div>
        </div>
    </section>

    <div style="text-align: center; padding: 40px 20px;">
        <a href="index.html" class="back-link">← トップページに戻る</a>
    </div>

    <!-- フッター -->
    <footer style="background-color: #333; color: white; padding: 40px 0; text-align: center; margin-top: 50px;">
        <div class="container">
            <p>&copy; 2024 hovvy. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- Scroll Reveal Animation Script -->
    <script>
        const observerOptions = {
            threshold: 0.2,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.feature-row').forEach(row => {
            observer.observe(row);
        });
    </script>

</body>
</html>
